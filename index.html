<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Tree Architect v0.9.3</title>
  
  <!-- Core Assets -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <!-- Application Styles -->
  <style>
    :root {
      --bg:           #020617;
      --bg-surface:   #0f172a;
      --bg-raised:    #1e293b;
      --bg-input:     #020617;
      --border:       #334155;
      --border-focus: #38bdf8;
      --glow:         #38bdf8;
      --glow-soft:    rgba(56, 189, 248, 0.15);
      --text:         #f8fafc;
      --text-muted:   #94a3b8;
      --text-mid:     #cbd5e1;
      --accent:       #38bdf8;
      --accent-green: #10b981;
      --accent-red:   #ef4444;
      --accent-amber: #f59e0b;
      --branch-char:  #475569;
      --node-color:   #7dd3fc;
      --root-color:   #ffffff;
      --panel-width:  400px;
      --header-height: 60px;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      --transition: 0.25s var(--ease);
    }

    @media print {
      @page { margin: 1cm; size: portrait; }
      body { background: white !important; color: black !important; height: auto !important; overflow: visible !important; display: block !important; }
      header, aside, footer, .mobile-actions, .crt-overlay, .ambient, .h-10, #toast, .modal-overlay { display: none !important; }
      main { display: block !important; overflow: visible !important; grid-template-columns: 1fr !important; }
      #panel-preview { display: block !important; width: 100% !important; background: white !important; overflow: visible !important; position: static !important; }
      .tree-viewport { display: flex !important; padding: 0 !important; overflow: visible !important; perspective: none !important; transform: none !important; justify-content: center; align-items: flex-start; }
      #ascii-render {
        background: white !important; color: black !important;
        border: none !important; box-shadow: none !important;
        padding: 0 !important; margin: 0 !important;
        white-space: pre !important; 
        font-size: 8pt !important;
        display: block !important;
        position: static !important;
        transform-origin: top center;
        zoom: 0.8;
      }
      #ascii-render span { color: black !important; text-shadow: none !important; background: none !important; border: none !important; }
      #ascii-render .root-node { font-weight: bold; }
    }

    [data-theme="matrix"] {
      --bg: #050a05;
      --bg-surface: #0a120a;
      --bg-raised: #152215;
      --border: #1a3a1a;
      --accent: #22c55e;
      --glow: #22c55e;
      --node-color: #4ade80;
      --border-focus: #22c55e;
    }

    [data-theme="amber"] {
      --bg: #0a0702;
      --bg-surface: #120d08;
      --bg-raised: #221a0f;
      --border: #3a2a1a;
      --accent: #f59e0b;
      --glow: #f59e0b;
      --node-color: #fbbf24;
      --border-focus: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.4s var(--ease);
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    .crt-overlay {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.015) 2px,
        rgba(0,0,0,0.015) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
      transition: background 0.8s var(--ease);
    }
    .ambient-1 { width: 600px; height: 600px; top: -200px; left: -150px; background: var(--glow); }
    .ambient-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: var(--accent-green); }

    header {
      position: relative;
      z-index: 10;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      min-height: var(--header-height);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .logo-container { display: flex; align-items: center; gap: 0.5rem; }
    .logo-icon {
      width: 24px; height: 24px; background: var(--accent); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; color: var(--bg);
      font-weight: 800; font-size: 0.75rem; box-shadow: 0 0 15px var(--glow-soft);
      transition: transform 0.3s var(--ease);
    }
    .logo-icon:hover { transform: rotate(10deg) scale(1.1); }
    .header-info h1 { font-size: 0.8rem; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: var(--panel-width) 1fr;
      flex: 1;
      overflow: hidden;
    }

    #panel-architect { border-right: 1px solid var(--border); background: var(--bg-surface); display: flex; flex-direction: column; overflow: hidden; }
    .toolbar-top { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; align-items: center; }
    .search-input-wrap { position: relative; flex: 1; display: flex; align-items: center; }
    .search-input {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.5rem 0.6rem 0.5rem 2.25rem; font-size: 0.9rem;
      color: var(--text); outline: none; transition: all var(--transition);
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--glow-soft); transform: translateY(-1px); }

    #breadcrumb-nav {
      background: var(--bg-surface); border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem; display: none; align-items: center; gap: 0.5rem;
      overflow-x: auto; white-space: nowrap; font-size: 0.75rem; color: var(--text-muted);
    }

    .nodes-container { flex: 1; overflow-y: auto; padding: 0.5rem; scroll-behavior: smooth; }
    .node-row {
      display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.6rem;
      border-radius: 8px; background: transparent; border: 1px solid transparent;
      cursor: pointer; transition: all var(--transition); min-height: 48px;
    }
    .node-row:hover { background: var(--bg-raised); transform: translateX(4px); }
    .node-row.active { background: rgba(56, 189, 248, 0.12); border-color: rgba(56, 189, 248, 0.4); }

    .node-expander {
      width: 24px; height: 24px; margin-top: 4px; display: flex; align-items: center;
      justify-content: center; color: var(--text-muted); cursor: pointer;
      transition: transform 0.3s var(--ease); flex-shrink: 0;
    }
    .node-expander.expanded { transform: rotate(90deg); }

    .node-label {
      flex: 1; font-size: 0.95rem; color: var(--text-mid); white-space: normal;
      word-break: break-word; outline: none; border: 1px solid transparent;
      padding: 4px 6px; border-radius: 4px; transition: all var(--transition);
    }
    .node-label:focus { background: var(--bg-input); border-color: var(--border); color: var(--text); }

    .node-actions { display: flex; gap: 4px; margin-top: 2px; flex-shrink: 0; opacity: 0.2; transition: opacity var(--transition); }
    .node-row:hover .node-actions, .node-row.active .node-actions { opacity: 1; }

    .action-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--text-muted); background: var(--bg-raised);
      border: 1px solid var(--border); transition: all var(--transition);
    }
    .action-btn:hover { background: var(--bg-input); color: var(--text); border-color: var(--accent); }

    .node-children { margin-left: 1.25rem; border-left: 1px solid var(--border); padding-left: 0.25rem; display: none; }
    .node-children.visible { display: block; }

    #panel-preview { display: flex; flex-direction: column; background: var(--bg); position: relative; overflow: hidden; }
    .tree-viewport { flex: 1; overflow: auto; padding: 1.5rem; display: flex; justify-content: center; align-items: flex-start; perspective: 1000px; }
    #ascii-render {
      background: var(--bg-surface); padding: 1.5rem; border-radius: 12px;
      border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      white-space: pre; line-height: 1.5; font-size: 0.8rem; color: var(--node-color);
      min-width: min-content; transition: all 0.4s var(--ease);
    }

    #ascii-render .root-node { color: var(--root-color); font-weight: 700; }
    #ascii-render .branch { color: var(--branch-char); }
    #ascii-render .node-text { cursor: pointer; transition: all var(--transition); border-radius: 4px; padding: 0 4px; display: inline-block; }
    #ascii-render .node-text:hover { background: var(--bg-raised); color: var(--text); }
    #ascii-render .highlight { background: var(--accent); color: var(--bg); border-radius: 4px; padding: 0 6px; }
    #ascii-render .search-match { background: var(--accent-amber); color: var(--bg); border-radius: 2px; }

    /* Depth Coloring - Noticeable Palette */
    .depth-0 { color: #ffffff !important; font-weight: 700; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
    .depth-1 { color: #f59e0b !important; }
    .depth-2 { color: #10b981 !important; }
    .depth-3 { color: #38bdf8 !important; }
    .depth-4 { color: #a855f7 !important; }
    .depth-5 { color: #ec4899 !important; }

    .btn {
      padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      gap: 0.4rem; transition: all var(--transition); border: 1px solid transparent;
    }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-outline { border-color: var(--border); background: var(--bg-surface); color: var(--text-mid); }

    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; left: 1.5rem;
      background: var(--bg-surface); border: 1px solid var(--accent);
      color: var(--text); padding: 0.75rem 1.25rem; border-radius: 12px;
      z-index: 10000; transform: translateY(150px); opacity: 0;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px); z-index: 10001;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 500px; padding: 1.5rem;
    }
  </style>
</head>
<body data-theme="default">

  <div class="crt-overlay"></div>
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <header>
    <div class="logo-container">
      <div class="logo-icon">N</div>
      <div class="header-info">
        <h1>Neural Tree</h1>
        <div class="flex gap-2 mt-0.5">
          <div class="theme-dot bg-sky-500 active" data-set-theme="default" title="Default Neon"></div>
          <div class="theme-dot bg-emerald-500" data-set-theme="matrix" title="Matrix Mode"></div>
          <div class="theme-dot bg-amber-500" data-set-theme="amber" title="Amber CRT"></div>
        </div>
      </div>
    </div>
    
    <div class="header-actions flex items-center gap-2">
      <div class="flex gap-1 border-r border-slate-800 pr-2 mr-1">
        <button class="action-btn" id="btn-undo" title="Undo (Ctrl+Z)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg></button>
        <button class="action-btn" id="btn-redo" title="Redo (Ctrl+Y)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg></button>
      </div>
      <button class="btn btn-outline" id="btn-tips" title="How to use">Tips</button>
      <button class="btn btn-outline text-red-400 border-red-900/30" id="btn-clear-all" title="Clear all nodes">Clear</button>
      <button class="btn btn-outline" id="btn-import" title="Import JSON">Imp</button>
      <button class="btn btn-outline" id="btn-export-json" title="Export JSON">JSON</button>
      <button class="btn btn-outline" id="btn-export-md" title="Export Markdown List">MD</button>
      <button class="btn btn-outline" id="btn-export-mmd" title="Export Mermaid Diagram">MMD</button>
      <button class="btn btn-outline" id="btn-print" title="Print Tree">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
        Print
      </button>
      <button class="btn btn-outline" id="btn-shot" title="Save as Image">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Shot
      </button>
      <button class="btn btn-primary" id="btn-copy" title="Copy ASCII Tree">Copy</button>
    </div>
  </header>

  <main>
    <aside id="panel-architect">
      <div class="toolbar-top">
        <div class="search-input-wrap">
          <span class="absolute left-2.5 text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <input type="text" id="node-search" class="search-input" placeholder="Search nodes...">
        </div>
        <button class="action-btn" id="btn-expand-all" title="Toggle All Nodes"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
      </div>
      <div id="breadcrumb-nav"></div>
      <div class="nodes-container" id="nodes-root-list"></div>
      <div class="p-4 border-t border-slate-800 bg-slate-900/50">
        <button class="btn btn-outline w-full justify-center py-3" id="btn-add-root" title="Add a new root topic">+ Add New Root Node</button>
      </div>
    </aside>

    <section id="panel-preview">
      <div class="h-10 px-4 border-b border-slate-800 flex items-center justify-between bg-slate-950/40 text-[0.7rem]">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          <span class="text-slate-400 uppercase tracking-widest font-bold">Live Preview</span>
        </div>
        <div class="flex gap-4 text-slate-500 mono">
          <span id="stat-nodes">NODES: 0</span>
          <span id="stat-depth">DEPTH: 0</span>
        </div>
      </div>
      <div class="tree-viewport">
        <div id="ascii-render" class="mono"></div>
      </div>
    </section>
  </main>

  <footer class="h-8 px-6 border-t border-slate-800 flex items-center justify-between text-[0.6rem] text-slate-500 bg-slate-950/80">
    <div class="flex gap-4"><span>SYSTEM_READY</span><span id="footer-save-indicator">AUTO_SAVE: ON</span></div>
    <div class="text-center">Made by @chqrlzz</div>
    <div class="mono opacity-50">V0.9.3_MODULAR</div>
  </footer>

  <div id="modal-tips" class="modal-overlay">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-accent">Interface Tips</h3>
        <button onclick="document.getElementById('modal-tips').classList.remove('active')">✕</button>
      </div>
      <div class="space-y-4 text-sm text-slate-300">
        <p>• Click nodes in the preview to focus them.</p>
        <p>• Use Ctrl+Z / Ctrl+Y for Undo/Redo.</p>
        <p>• Multi-format export: ASCII, JSON, MD, and MMD!</p>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- JavaScript Modules -->
  <script src="src/js/state.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
